name: Deploy Staging

on:
  push:
    branches: [staging]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

concurrency:
  group: staging-deploy
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Bump version
        run: |
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version $BUMP --no-git-tag-version
          git add package.json
          git commit -m "chore: bump $BUMP version to $(node -p 'require(\"./package.json\").version') [skip ci]"
          git push

      - name: Build staging site
        run: npm run build:staging
        env:
          VITE_BASE_PATH: ${{ secrets.VITE_STAGING_BASE_PATH }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_STAGING_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_STAGING_SUPABASE_ANON_KEY }}
          VITE_ARCHIVE_TABLE: archive
          VITE_STAKE_PW: ${{ secrets.VITE_STAKE_PW }}
          VITE_ADMIN_PW: ${{ secrets.VITE_ADMIN_PW }}
          VITE_CONCERN_EMAIL_URL: ${{ secrets.VITE_CONCERN_EMAIL_URL }}
          VITE_CONCERN_EMAIL_TOKEN: ${{ secrets.VITE_CONCERN_EMAIL_TOKEN }}
          VITE_MEMBER_PROVISION_URL: ${{ secrets.VITE_STAGING_MEMBER_PROVISION_URL }}
          VITE_MEMBER_PROVISION_TOKEN: ${{ secrets.VITE_STAGING_MEMBER_PROVISION_TOKEN }}

      - name: Deploy dist to staging repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.STAGING_DEPLOY_TOKEN }}
          external_repository: johntg/therecord-staging
          publish_branch: gh-pages
          publish_dir: ./dist
          force_orphan: true
          commit_message: "deploy: staging build from ${{ github.sha }}"
