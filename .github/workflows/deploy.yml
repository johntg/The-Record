name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      version_bump:
        description: 'Version bump type'
        required: false
        default: 'patch'
        type: choice
        options:
          - patch
          - minor
          - major

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Bump version
        run: |
          BUMP="${{ github.event.inputs.version_bump || 'patch' }}"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          npm version $BUMP --no-git-tag-version
          node scripts/write-build-version.mjs
          NEW_VERSION=$(node -p 'require("./package.json").version')
          git add package.json public/build-version.json index.html
          git commit -m "chore: bump $BUMP version to $NEW_VERSION [skip ci]"
          git push

      - name: Build site
        run: npm run build:prod
        env:
          VITE_BASE_PATH: ${{ secrets.VITE_BASE_PATH }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL_TRAINING: ${{ secrets.VITE_SUPABASE_URL_TRAINING }}
          VITE_SUPABASE_ANON_KEY_TRAINING: ${{ secrets.VITE_SUPABASE_ANON_KEY_TRAINING }}
          VITE_ARCHIVE_TABLE: archive
          VITE_STAKE_PW: ${{ secrets.VITE_STAKE_PW }}
          VITE_ADMIN_PW: ${{ secrets.VITE_ADMIN_PW }}
          VITE_CONCERN_EMAIL_URL: ${{ secrets.VITE_CONCERN_EMAIL_URL }}
          VITE_CONCERN_EMAIL_TOKEN: ${{ secrets.VITE_CONCERN_EMAIL_TOKEN }}
          VITE_MEMBER_PROVISION_URL: ${{ secrets.VITE_MEMBER_PROVISION_URL }}
          VITE_MEMBER_PROVISION_TOKEN: ${{ secrets.VITE_MEMBER_PROVISION_TOKEN }}

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
